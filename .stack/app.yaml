# stack's own context (schema v2). stack dogfoods itself: it runs its own check/
# setup flows AND builds its own binary via the `go` build plugin.
name: stack
tools_manager: asdf

patterns:
  build:
    pipeline: [check, build]
    checks:
      format: { tool: gofmt, blocking: true }
      unit: { tool: go-test, blocking: true, args: { short: true } }
    artifacts:
      stack: { package: ./cmd/stack, output: bin/stack }
    build: { tool: go }
