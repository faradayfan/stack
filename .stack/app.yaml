# stack's own context (schema v2). stack dogfoods itself: it runs its own check/
# setup flows AND builds its own binary via the `go` build plugin.
name: stack
tools_manager: asdf

patterns:
  # The CI/verification pattern — checks only.
  ci:
    pipeline: [check]
    checks:
      format: { tool: gofmt, blocking: true }
      unit: { tool: go-test, blocking: true, args: { short: true } }

  # The local build pattern — `stack build` runs checks first, then compiles the
  # binary. The `pipeline` lists the stages in order; `stack build` runs up to &
  # including `build`, so `check` first means the build is gated by the checks.
  # No `type`: the `build` stage runs whatever the `build:` block names (here go).
  local:
    pipeline: [check, build]
    checks:
      format: { tool: gofmt, blocking: true }
      unit: { tool: go-test, blocking: true, args: { short: true } }
    artifacts:
      stack: { package: ./cmd/stack, output: bin/stack }
    build: { tool: go }
