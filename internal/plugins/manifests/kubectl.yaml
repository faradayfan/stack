tool: kubectl
detect: "kubectl version --client -o yaml"
provides: [status, logs, destroy]
steps:
  status:
    command: "kubectl --context {{.kube_context}} -n {{.namespace}} get pods"
  logs:
    command: "kubectl --context {{.kube_context}} -n {{.namespace}} logs {{.component}}"
  # destroy: `down --destroy` runs this after teardown to drop the PVCs (volumes).
  destroy:
    command: "kubectl --context {{.kube_context}} -n {{.namespace}} delete pvc --all"
