name: CI

# stack dogfoods itself: CI builds the binary, lets `stack setup` install the
# tools its checks need (via asdf), then runs `stack check` — the single
# declarative definition of the verification suite (format + lint + test).
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: stack check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      # Install the asdf CLI (the tools manager `stack setup` drives). v4 installs
      # the released asdf binary and puts it + its shims on PATH; `stack setup`
      # then installs the tools pinned in .tool-versions (golangci-lint; go is
      # already provided by setup-go above).
      - uses: asdf-vm/actions/setup@b7bcd026f18772e44fe1026d729e1611cc435d47 # v4

      - name: Build stack
        run: go build -o bin/stack ./cmd/stack

      - name: Install check tools (stack setup)
        run: ./bin/stack setup

      - name: Run checks (stack check)
        run: ./bin/stack check
